<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#0b1020" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Case Ladder" />
<link rel="manifest" href="manifest.json" />
<title>Clinical Case-Ladder MCQ Add-On</title>
<style>
:root {
  --bg: #f5f7fb;
  --paper: #ffffff;
  --paper-2: #f8fafc;
  --ink: #182235;
  --muted: #64748b;
  --line: #d9e2ef;
  --line-strong: #b8c6da;
  --accent: #1d4ed8;
  --accent-2: #0f766e;
  --accent-3: #c2410c;
  --accent-soft: #eef6ff;
  --danger: #be123c;
  --ring: rgba(29, 78, 216, .18);
  --shadow: 0 18px 45px rgba(15, 23, 42, .08);
  --soft-shadow: 0 10px 24px rgba(15, 23, 42, .07);
  --radius-lg: 28px;
  --radius-md: 20px;
  --radius-sm: 14px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  color: var(--ink);
  background:
    linear-gradient(135deg, rgba(29, 78, 216, .10), transparent 26%),
    linear-gradient(315deg, rgba(15, 118, 110, .10), transparent 30%),
    linear-gradient(180deg, #ffffff 0%, var(--bg) 28%, #eef3f9 100%);
  background-attachment: fixed;
}
button, input, select { font: inherit; }
.app { min-height: 100vh; display: grid; grid-template-columns: 360px 1fr; }
.sidebar {
  position: sticky; top: 0; height: 100vh; overflow: auto;
  padding: 22px 18px; background: color-mix(in srgb, var(--paper) 92%, var(--accent-soft)); border-right: 1px solid var(--line);
  box-shadow: 14px 0 38px rgba(15, 23, 42, .04);
}
.brand { padding: 8px 8px 18px; }
.brand-mark { height: 6px; width: 152px; border-radius: 999px; background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3)); margin-bottom: 18px; box-shadow: 0 0 24px color-mix(in srgb, var(--accent) 22%, transparent); }
h1 { margin: 0; font-size: 24px; line-height: 1.08; color: var(--ink); letter-spacing: 0; }
.subtitle { margin: 8px 0 0; color: var(--muted); font-size: 13px; line-height: 1.45; }
.creator-credit {
  display: inline-flex; align-items: center; gap: 6px;
  margin: 12px 0 0; padding: 8px 11px; border-radius: 999px;
  color: var(--accent); background: color-mix(in srgb, var(--accent-soft) 82%, var(--paper));
  border: 1px solid color-mix(in srgb, var(--accent) 24%, var(--line));
  font-size: 12px; font-weight: 800;
}
.creator-credit strong { color: var(--ink); }
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
.stat { border-radius: var(--radius-md); padding: 13px; background: linear-gradient(160deg, var(--paper), var(--paper-2)); border: 1px solid var(--line); box-shadow: var(--soft-shadow); }
.stat b { display: block; color: var(--accent); font-size: 22px; letter-spacing: 0; }
.stat span { color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; }
.search { display: grid; gap: 10px; margin: 16px 0; }
.search input, .search select {
  width: 100%; border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 12px 14px;
  outline: none; color: var(--ink); background: var(--paper-2);
}
.search input:focus, .search select:focus { border-color: var(--accent); box-shadow: 0 0 0 5px var(--ring); background: var(--paper); }
.topic-list { display: grid; gap: 8px; padding: 6px 0 20px; }
.topic-button {
  width: 100%; text-align: left; border: 1px solid transparent; background: transparent; border-radius: var(--radius-md);
  padding: 11px 12px; cursor: pointer; color: var(--muted); transition: background .16s ease, border-color .16s ease, transform .16s ease;
}
.topic-button:hover { transform: translateY(-1px); box-shadow: var(--soft-shadow); }
.topic-button.active { border-color: color-mix(in srgb, var(--topic-primary) 32%, var(--line)); background: linear-gradient(135deg, color-mix(in srgb, var(--topic-soft) 70%, var(--paper)), var(--paper)); box-shadow: var(--soft-shadow); }
.topic-title { display: block; font-weight: 760; color: var(--ink); line-height: 1.25; }
.topic-meta { display: block; margin-top: 5px; font-size: 12px; color: var(--muted); }
.main { padding: 28px clamp(24px, 4vw, 58px) 54px; max-width: 1440px; width: 100%; }
.topbar { display: flex; gap: 12px; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
.pill-row { display: flex; gap: 10px; flex-wrap: wrap; }
.pill { border: 1px solid var(--line); border-radius: 999px; padding: 8px 12px; background: linear-gradient(135deg, var(--paper), var(--paper-2)); color: var(--muted); font-weight: 800; font-size: 12px; box-shadow: 0 1px 0 rgba(15,23,42,.03); }
.action-row { display: flex; gap: 10px; flex-wrap: wrap; }
.action { border: 0; border-radius: var(--radius-sm); padding: 10px 14px; color: #fff; font-weight: 800; cursor: pointer; background: var(--accent); box-shadow: var(--soft-shadow); }
.action.secondary { background: var(--ink); }
.action.ghost { background: var(--paper); color: var(--ink); border: 1px solid var(--line); }
.hero {
  position: relative; overflow: hidden;
  border-radius: var(--radius-lg); background:
    linear-gradient(135deg, color-mix(in srgb, var(--topic-soft) 70%, white), var(--paper) 38%, var(--paper));
  border: 1px solid var(--line); padding: 28px;
  box-shadow: var(--shadow); margin-bottom: 18px;
}
.hero::before {
  content: ""; position: absolute; inset: 0 0 auto 0; height: 8px;
  background: linear-gradient(90deg, var(--topic-primary), var(--accent-2), var(--accent-3));
}
.hero::after {
  content: ""; position: absolute; right: 24px; top: 24px; width: 190px; height: 190px;
  background:
    linear-gradient(90deg, color-mix(in srgb, var(--topic-primary) 18%, transparent) 1px, transparent 1px),
    linear-gradient(0deg, color-mix(in srgb, var(--topic-primary) 14%, transparent) 1px, transparent 1px);
  background-size: 18px 18px; mask-image: linear-gradient(135deg, black, transparent 72%);
  pointer-events: none;
}
.hero h2 { margin: 0; color: var(--ink); font-size: clamp(30px, 4vw, 46px); line-height: 1.05; letter-spacing: 0; }
.base-case { margin-top: 20px; border-radius: var(--radius-md); border: 1px solid var(--line); background: linear-gradient(180deg, var(--paper), color-mix(in srgb, var(--topic-soft) 54%, var(--paper))); padding: 18px 20px; border-left: 5px solid var(--topic-primary); position: relative; z-index: 1; }
.label { color: var(--topic-primary); font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 0; }
.base-case p { margin: 8px 0 0; font-size: 17px; line-height: 1.55; color: #334155; }
.flow { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-top: 16px; }
.flow-card { border-radius: var(--radius-md); border: 1px solid var(--line); padding: 14px; min-height: 94px; background: linear-gradient(180deg, var(--paper), var(--paper-2)); box-shadow: 0 8px 18px rgba(15,23,42,.05); }
.flow-card:nth-child(1) { border-top: 4px solid var(--accent); }
.flow-card:nth-child(2) { border-top: 4px solid var(--accent-2); }
.flow-card:nth-child(3) { border-top: 4px solid var(--accent-3); }
.flow-card:nth-child(4) { border-top: 4px solid var(--topic-primary); }
.flow-card strong { color: var(--topic-primary); display: block; margin-bottom: 7px; }
.flow-card span { color: #475569; line-height: 1.35; }
.segment-grid { display: grid; gap: 16px; }
.segment { border-radius: var(--radius-lg); border: 1px solid var(--line); background: var(--paper); box-shadow: var(--soft-shadow); overflow: hidden; transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease; }
.segment:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: color-mix(in srgb, var(--topic-primary) 34%, var(--line)); }
.segment-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 17px 19px; cursor: pointer; border-left: 5px solid var(--topic-primary); }
.segment-head h3 { margin: 0; color: var(--ink); font-size: 19px; line-height: 1.2; }
.tag { border-radius: 999px; padding: 6px 10px; background: var(--topic-soft); color: var(--topic-primary); font-size: 11px; font-weight: 900; text-transform: uppercase; white-space: nowrap; border: 1px solid var(--topic-primary); }
.segment-body { display: none; padding: 0 18px 18px; }
.segment.open .segment-body { display: block; }
.stem { margin: 0 0 12px; color: #253247; font-size: 16px; line-height: 1.5; font-weight: 700; }
.options { display: grid; gap: 9px; margin-bottom: 12px; }
.option { border: 1px solid var(--line); background: linear-gradient(180deg, var(--paper), var(--paper-2)); border-radius: var(--radius-sm); padding: 11px 12px; display: flex; gap: 10px; align-items: flex-start; }
.option .letter { color: var(--topic-primary); font-weight: 900; min-width: 24px; }
.reveal-row { display: flex; gap: 9px; flex-wrap: wrap; margin: 12px 0; }
.reveal-btn { border: 0; cursor: pointer; border-radius: var(--radius-sm); padding: 9px 12px; font-weight: 900; background: var(--topic-primary); color: white; }
.reveal-btn.alt { background: #fff; color: var(--topic-primary); border: 1px solid var(--topic-primary); }
.explain { display: none; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-top: 10px; }
.explain.show { display: grid; }
.explain-card { border-radius: var(--radius-md); padding: 13px 14px; background: var(--paper-2); border: 1px solid var(--line); }
.explain-card.answer { background: #f0fdfa; border-color: #99f6e4; }
.explain-card.trap { background: #fff7ed; border-color: #fed7aa; }
.explain-card.alert { background: #eff6ff; border-color: #bfdbfe; }
.explain-card b { display: block; color: var(--topic-primary); margin-bottom: 5px; }
.explain-card p { margin: 0; line-height: 1.42; }
.final-rule { margin-top: 18px; border: 1px solid var(--line); border-left: 5px solid var(--accent-2); background: var(--paper); border-radius: var(--radius-md); padding: 16px 18px; color: #475569; box-shadow: var(--soft-shadow); }
.final-rule strong { color: var(--accent-2); display: block; margin-bottom: 6px; }
.empty { display:none; padding: 30px; background:var(--paper); border:1px solid var(--line); border-radius:var(--radius-lg); color:var(--muted); }
.progress { height: 10px; background: #e5eaf2; border-radius: 999px; overflow: hidden; margin: 14px 0 4px; }
.progress > div { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .2s ease; }
.control-panel { display: grid; gap: 10px; margin: 16px 0; padding: 12px; border: 1px solid var(--line); background: var(--paper-2); border-radius: var(--radius-md); }
.control-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.control-panel label { display: grid; gap: 5px; color: var(--muted); font-size: 11px; font-weight: 900; text-transform: uppercase; }
.control-panel input, .control-panel select {
  width: 100%; border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 10px 11px;
  outline: none; color: var(--ink); background: var(--paper);
}
.mini-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.mini-btn { border: 1px solid var(--line); background: var(--paper); color: var(--ink); border-radius: var(--radius-sm); padding: 8px 10px; font-weight: 900; cursor: pointer; }
.mini-btn.danger { color: var(--danger); border-color: #fecdd3; }
.dashboard { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 18px; }
.dash-card { border-radius: var(--radius-md); padding: 16px; background: linear-gradient(160deg, var(--paper), var(--paper-2)); border: 1px solid var(--line); box-shadow: var(--soft-shadow); position: relative; overflow: hidden; }
.dash-card::before { content:""; position:absolute; left:0; right:0; top:0; height:4px; background:linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3)); }
.dash-card b { display: block; color: var(--accent); font-size: 28px; letter-spacing: 0; }
.dash-card span { color: var(--muted); font-size: 12px; font-weight: 900; text-transform: uppercase; }
.topic-button.done { border-color: #99f6e4; background: #f0fdfa; }
.topic-button .topic-progress { display: block; margin-top: 8px; height: 6px; border-radius: 999px; background: #e5eaf2; overflow: hidden; }
.topic-button .topic-progress i { display: block; height: 100%; width: var(--done-width, 0%); background: var(--topic-primary, var(--accent)); }
.toast { position: fixed; right: 22px; bottom: 22px; z-index: 20; padding: 12px 14px; border-radius: 18px; background: #0f172a; color: #fff; box-shadow: var(--shadow); opacity: 0; transform: translateY(8px); pointer-events: none; transition: .18s ease; }
.toast.show { opacity: 1; transform: translateY(0); }
body[data-theme="ocean"] { --accent: #0369a1; --accent-2: #0f766e; --accent-soft: #ecfeff; }
body[data-theme="clinical"] { --accent: #2563eb; --accent-2: #059669; --accent-soft: #eef6ff; }
body[data-theme="sunset"] { --accent: #7c2d12; --accent-2: #9f1239; --accent-soft: #fff7ed; }
body[data-mode="dark"] {
  --bg: #0b1020; --paper: #111827; --paper-2: #151f31; --ink: #e5edf8; --muted: #9aa8bc; --line: #273449; --line-strong: #3b4b63;
  --accent: #60a5fa; --accent-2: #2dd4bf; --accent-3: #f59e0b; --ring: rgba(96, 165, 250, .22); --shadow: 0 22px 50px rgba(0,0,0,.32); --soft-shadow: 0 14px 30px rgba(0,0,0,.24);
  background:
    linear-gradient(135deg, rgba(96, 165, 250, .16), transparent 28%),
    linear-gradient(315deg, rgba(45, 212, 191, .13), transparent 28%),
    #0b1020;
}
body[data-mode="dark"] .sidebar, body[data-mode="dark"] .hero, body[data-mode="dark"] .segment, body[data-mode="dark"] .dash-card {
  background: var(--paper); border-color: var(--line);
}
body[data-mode="dark"] .hero {
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--topic-primary) 18%, var(--paper-2)), var(--paper) 42%, #0f172a);
}
body[data-mode="dark"] h1, body[data-mode="dark"] .hero h2, body[data-mode="dark"] .segment-head h3, body[data-mode="dark"] .stem, body[data-mode="dark"] .base-case p, body[data-mode="dark"] .flow-card span, body[data-mode="dark"] .explain-card p, body[data-mode="dark"] .final-rule, body[data-mode="dark"] .topic-title { color: var(--ink); }
body[data-mode="dark"] .subtitle, body[data-mode="dark"] .topic-meta, body[data-mode="dark"] .dash-card span { color: var(--muted); }
body[data-mode="dark"] .topic-button, body[data-mode="dark"] .pill, body[data-mode="dark"] .action.ghost, body[data-mode="dark"] .mini-btn,
body[data-mode="dark"] .search input, body[data-mode="dark"] .search select, body[data-mode="dark"] .control-panel input, body[data-mode="dark"] .control-panel select {
  background: var(--paper-2); border-color: var(--line); color: var(--ink);
}
body[data-mode="dark"] .stat, body[data-mode="dark"] .control-panel, body[data-mode="dark"] .option, body[data-mode="dark"] .explain-card, body[data-mode="dark"] .base-case, body[data-mode="dark"] .flow-card:nth-child(n), body[data-mode="dark"] .final-rule { background: var(--paper-2); border-color: var(--line); }
@media (prefers-reduced-motion: no-preference) {
  .brand-mark, .progress > div, .dash-card::before, .hero::before { background-size: 180% 100%; animation: sheen 7s ease-in-out infinite alternate; }
  @keyframes sheen { from { background-position: 0% 50%; } to { background-position: 100% 50%; } }
}
@media (max-width: 960px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: relative; height: auto; max-height: none; }
  .brand { padding-bottom: 10px; }
  h1 { font-size: 23px; }
  .stats { grid-template-columns: 1fr 1fr; }
  .topic-list { max-height: 280px; overflow: auto; padding-right: 4px; }
  .flow, .explain, .dashboard, .control-row { grid-template-columns: 1fr; }
  .topbar { position: sticky; top: 0; z-index: 5; padding: 10px 0; background: linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg) 88%, transparent)); }
  .pill-row { display: none; }
  .hero { padding: 22px 18px; border-radius: 24px; }
  .hero h2 { font-size: 30px; }
  .base-case p { font-size: 16px; }
  .segment { border-radius: 24px; }
  .segment-head { align-items: flex-start; }
  .segment-head h3 { font-size: 17px; }
  .tag { font-size: 10px; }
  .main { padding: 20px 14px 40px; }
}
@media print {
  body { background: #fff; } .sidebar, .topbar, .reveal-row { display:none; } .app { display:block; }
  .main { padding:0; } .segment-body, .explain { display:block !important; } .segment { break-inside: avoid; box-shadow:none; }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"></div>
      <h1>Clinical Case-Ladder MCQ Add-On</h1>
      <p class="subtitle">Pilot sample for manual, high-attention NRE reasoning practice</p>
      <p class="creator-credit">Created by <strong>Ahmad Zafar</strong></p>
      <div class="stats">
        <div class="stat"><b id="topicCount">0</b><span>Topics</span></div>
        <div class="stat"><b id="segmentCount">0</b><span>Segments</span></div>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
      <p class="subtitle"><span id="progressText">0 completed</span></p>
    </div>
    <div class="control-panel">
      <div class="control-row">
        <label>Profile<select id="profileSelect"></select></label>
        <label>Mode<select id="modeSelect"><option value="light">Light</option><option value="dark">Dark</option></select></label>
      </div>
      <div class="control-row">
        <label>Theme<select id="themeSelect"><option value="default">Default</option><option value="ocean">Ocean</option><option value="clinical">Clinical</option><option value="sunset">Sunset</option></select></label>
        <label>New profile<input id="profileName" placeholder="Name" /></label>
      </div>
      <div class="mini-actions"><button class="mini-btn" id="addProfile">Add profile</button><button class="mini-btn" id="deleteProfile">Delete profile</button><button class="mini-btn danger" id="resetProgress">Reset progress</button></div>
    </div>
    <div class="search">
      <input id="searchBox" type="search" placeholder="Search topics, stems, traps..." />
      <select id="tagFilter"><option value="">All segment types</option></select>
    </div>
    <div class="topic-list" id="topicList"></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="pill-row"><span class="pill">Case-Ladder Add-On</span><span class="pill">Single Source JSON</span><span class="pill">Answer Reveal Mode</span></div>
      <div class="action-row"><button class="action ghost" id="collapseAll">Collapse</button><button class="action secondary" id="expandAll">Expand</button><button class="action" onclick="window.print()">Print</button></div>
    </div>
    <section class="dashboard" id="dashboard"></section>
    <div id="content"></div>
    <div id="empty" class="empty">No matching topics. Try clearing the search or tag filter.</div>
  </main>
</div>
<div class="toast" id="toast"></div>
<script id="caseData" type="application/json">{"title": "Clinical Case-Ladder MCQ Add-On", "subtitle": "Pilot sample for manual, high-attention NRE reasoning practice", "boundary": "This is a separate add-on format. It does not replace the existing MedCORE MCQ framework, NRE50 rotation logic, or standard standalone MCQ production.", "status_strip": [{"label": "FORMAT", "value": "Case-Ladder"}, {"label": "OUTPUT", "value": "DOCX Pilot"}, {"label": "STYLE", "value": "Manual Review"}, {"label": "STATUS", "value": "Add-On Only"}], "workflow": [{"label": "1. Base Case", "text": "One patient scenario anchors the topic."}, {"label": "2. Variable", "text": "One clue changes in each segment."}, {"label": "3. MCQ", "text": "Options test the new discriminator."}, {"label": "4. Debrief", "text": "Answer, trap, and future alert close the loop."}], "reading_notes": ["One base clinical scenario anchors the topic.", "Each segment changes one meaningful discriminator.", "The answer may stay the same or change depending on the altered clue.", "The goal is not question volume; the goal is recognition of answer-changing variables.", "Each segment keeps the existing MCQ breakdown language: discriminator, trap, and future alert."], "topics": [{"title": "Acute Scrotum", "accent": "emerald", "base_case": "A 16-year-old boy presents to the emergency department with sudden severe left scrotal pain for 3 hours. He has nausea and one episode of vomiting. On examination, the left testis is high-riding and tender.", "decision_flow": [{"label": "Sudden + vomiting", "text": "Think torsion first"}, {"label": "Gradual + urinary", "text": "Shift to epididymo-orchitis"}, {"label": "Classic torsion", "text": "Do not delay exploration"}, {"label": "Doppler", "text": "Reduced flow supports torsion"}], "segments": [{"title": "Diagnosis Recognition", "tag": "diagnosis", "stem": "What is the most likely diagnosis?", "options": [["A", "Epididymo-orchitis"], ["B", "Testicular torsion"], ["C", "Torsion of appendix testis"], ["D", "Incarcerated inguinal hernia"]], "answer": "B. Testicular torsion", "discriminator": "Sudden severe pain, adolescent age group, vomiting, and high-riding testis.", "trap": "Epididymo-orchitis is tempting because both cause scrotal pain.", "future_alert": "In acute adolescent scrotal pain, sudden onset with high-riding testis is torsion until proven otherwise."}, {"title": "Infective Mimic", "tag": "mimic", "stem": "Same patient, but pain developed gradually over 2 days. He has fever, dysuria, urinary frequency, and posterior epididymal tenderness. What is now most likely?", "options": [["A", "Testicular torsion"], ["B", "Epididymo-orchitis"], ["C", "Varicocele"], ["D", "Hydrocele"]], "answer": "B. Epididymo-orchitis", "discriminator": "Gradual onset plus fever, urinary symptoms, and epididymal tenderness.", "trap": "Testicular torsion is tempting because the broad presentation is still acute scrotum.", "future_alert": "Urinary symptoms and gradual onset shift the case toward epididymo-orchitis."}, {"title": "Urgent Management", "tag": "management", "stem": "Return to the original sudden-onset case. Doppler ultrasound is not immediately available. What is the next best step?", "options": [["A", "Wait for Doppler ultrasound"], ["B", "Start oral antibiotics and review in 48 hours"], ["C", "Immediate surgical exploration"], ["D", "Reassure and discharge"]], "answer": "C. Immediate surgical exploration", "discriminator": "High clinical suspicion and time-sensitive testicular salvage.", "trap": "Waiting for imaging delays treatment when the clinical picture is classic.", "future_alert": "Do not delay exploration for imaging when torsion is clinically obvious."}, {"title": "Doppler Finding", "tag": "investigation", "stem": "A Doppler ultrasound is performed in suspected torsion. Which finding supports testicular torsion?", "options": [["A", "Increased blood flow to the affected testis"], ["B", "Reduced or absent blood flow to the affected testis"], ["C", "Multiple cystic spaces around the testis"], ["D", "Dilated pampiniform plexus"]], "answer": "B. Reduced or absent blood flow to the affected testis", "discriminator": "Torsion compromises testicular blood flow.", "trap": "Increased flow belongs more with inflammation or infection.", "future_alert": "Torsion means reduced flow; infection usually means increased flow."}], "final_learning_rule": "Acute scrotum is tested by changing onset, urinary symptoms, fever, testicular position, Doppler flow, and urgency of management."}, {"title": "Early Pregnancy Bleeding", "accent": "coral", "base_case": "A 28-year-old woman at 8 weeks of pregnancy presents with heavy vaginal bleeding and lower abdominal cramps. On pelvic examination, the cervical os is open. Ultrasound shows products of conception within the cervical canal.", "decision_flow": [{"label": "Open os + products", "text": "Incomplete abortion"}, {"label": "Closed os + viable", "text": "Threatened abortion"}, {"label": "Closed os + nonviable", "text": "Missed abortion"}, {"label": "Pain + no IUP", "text": "Ectopic until excluded"}], "segments": [{"title": "Abortion Type", "tag": "classification", "stem": "What is the most likely diagnosis?", "options": [["A", "Threatened abortion"], ["B", "Inevitable abortion"], ["C", "Incomplete abortion"], ["D", "Missed abortion"]], "answer": "C. Incomplete abortion", "discriminator": "Open os with products of conception already passing or retained.", "trap": "Inevitable abortion is tempting because the os is open, but products in the canal point to incomplete abortion.", "future_alert": "Products of conception partially expelled means incomplete abortion."}, {"title": "Threatened Variant", "tag": "variant", "stem": "Same gestational age, but now she has mild bleeding, no cramps, closed cervical os, and ultrasound confirms a viable intrauterine pregnancy. What is the diagnosis?", "options": [["A", "Threatened abortion"], ["B", "Incomplete abortion"], ["C", "Missed abortion"], ["D", "Septic abortion"]], "answer": "A. Threatened abortion", "discriminator": "Bleeding with closed os and a viable intrauterine pregnancy.", "trap": "Incomplete abortion is tempting because bleeding is present.", "future_alert": "Closed os plus viable pregnancy means threatened abortion."}, {"title": "Missed Variant", "tag": "variant", "stem": "Same patient presents with brownish vaginal discharge. Cervical os is closed. Ultrasound shows a nonviable intrauterine pregnancy with no fetal cardiac activity. What is the diagnosis?", "options": [["A", "Threatened abortion"], ["B", "Missed abortion"], ["C", "Inevitable abortion"], ["D", "Ectopic pregnancy"]], "answer": "B. Missed abortion", "discriminator": "Fetal demise retained in the uterus with a closed os.", "trap": "Threatened abortion is tempting because the os is also closed.", "future_alert": "Closed os does not always mean threatened; fetal viability decides."}, {"title": "Ectopic Shift", "tag": "danger shift", "stem": "Now change the case: she has 7 weeks amenorrhea, lower abdominal pain, slight vaginal bleeding, dizziness, and adnexal tenderness. Urine pregnancy test is positive, but ultrasound does not show an intrauterine pregnancy. What is the most concerning diagnosis?", "options": [["A", "Threatened abortion"], ["B", "Ectopic pregnancy"], ["C", "Missed abortion"], ["D", "Molar pregnancy"]], "answer": "B. Ectopic pregnancy", "discriminator": "Pregnancy with pain, bleeding, adnexal tenderness, and no intrauterine pregnancy seen.", "trap": "Abortion types are tempting because early pregnancy bleeding is shared by all.", "future_alert": "Early pregnancy bleeding with pain and no intrauterine pregnancy means ectopic until excluded."}], "final_learning_rule": "Early pregnancy bleeding is tested by changing cervical os, fetal viability, products of conception, pain severity, adnexal findings, and ultrasound location."}, {"title": "Chest Pain: ACS vs Mimics", "accent": "emerald", "base_case": "A 58-year-old man with diabetes and hypertension presents with crushing central chest pain for 45 minutes. The pain radiates to his left arm and is associated with sweating and nausea.", "decision_flow": [{"label": "Pressure + sweating", "text": "ACS until proven otherwise"}, {"label": "ST elevation", "text": "Immediate reperfusion"}, {"label": "Pleuritic + positional", "text": "Think pericarditis"}, {"label": "Tearing to back", "text": "Think aortic dissection"}], "segments": [{"title": "Initial Diagnosis", "tag": "diagnosis", "stem": "What is the most likely diagnosis?", "options": [["A", "Acute coronary syndrome"], ["B", "Gastroesophageal reflux disease"], ["C", "Panic attack"], ["D", "Costochondritis"]], "answer": "A. Acute coronary syndrome", "discriminator": "Crushing central pain, radiation, diaphoresis, nausea, and vascular risk factors.", "trap": "Reflux and panic can cause chest discomfort, but autonomic symptoms with classic radiation are higher-risk.", "future_alert": "Central pressure with sweating and risk factors is ACS until excluded."}, {"title": "STEMI Shift", "tag": "management", "stem": "ECG now shows ST elevation in leads II, III, and aVF. What is the best immediate management priority?", "options": [["A", "Discharge after antacid trial"], ["B", "Immediate reperfusion therapy"], ["C", "Outpatient exercise stress test"], ["D", "Oral antibiotics"]], "answer": "B. Immediate reperfusion therapy", "discriminator": "ST elevation in an acute ischemic presentation means STEMI.", "trap": "Troponin confirmation can be tempting, but reperfusion should not be delayed when STEMI is clear.", "future_alert": "STEMI is a treatment diagnosis: activate reperfusion pathway."}, {"title": "Pericarditis Mimic", "tag": "mimic", "stem": "Same patient age, but pain is sharp, pleuritic, worse lying flat, relieved by sitting forward, and ECG shows diffuse ST elevation. What is most likely?", "options": [["A", "Inferior STEMI"], ["B", "Acute pericarditis"], ["C", "Pulmonary embolism"], ["D", "Stable angina"]], "answer": "B. Acute pericarditis", "discriminator": "Pleuritic positional pain plus diffuse ST elevation.", "trap": "ST elevation may pull the eye toward MI, but diffuse elevation with positional pain suggests pericarditis.", "future_alert": "Diffuse ST elevation and relief leaning forward point to pericarditis."}, {"title": "Dissection Danger", "tag": "danger shift", "stem": "Now pain is sudden, tearing, radiates to the back, and blood pressure differs between arms. What is the most concerning diagnosis?", "options": [["A", "Aortic dissection"], ["B", "Unstable angina"], ["C", "Acute pancreatitis"], ["D", "Pneumothorax"]], "answer": "A. Aortic dissection", "discriminator": "Tearing pain to the back with pulse or BP asymmetry.", "trap": "ACS is common, but anticoagulation before recognizing dissection can be dangerous.", "future_alert": "Tearing chest pain to back plus unequal arm BP is dissection until excluded."}], "final_learning_rule": "Chest pain questions change radiation, ECG pattern, positional features, vascular risk, and danger signs to force ACS versus mimic discrimination."}, {"title": "Acute Stroke Window", "accent": "coral", "base_case": "A 67-year-old man develops sudden right-sided weakness and expressive aphasia 90 minutes before arrival. Blood glucose is normal and non-contrast CT brain shows no hemorrhage.", "decision_flow": [{"label": "Sudden focal deficit", "text": "Stroke pathway"}, {"label": "CT excludes bleed", "text": "Consider thrombolysis if eligible"}, {"label": "Hypoglycemia", "text": "Stroke mimic"}, {"label": "Late/unknown onset", "text": "No routine thrombolysis"}], "segments": [{"title": "Most Likely Diagnosis", "tag": "diagnosis", "stem": "What is the most likely diagnosis?", "options": [["A", "Ischemic stroke"], ["B", "Bell palsy"], ["C", "Migraine aura"], ["D", "Hypoglycemia"]], "answer": "A. Ischemic stroke", "discriminator": "Sudden focal neurologic deficit with cortical sign and normal glucose.", "trap": "Bell palsy causes facial weakness, but aphasia and arm weakness localize centrally.", "future_alert": "Sudden focal deficit with aphasia is stroke until proven otherwise."}, {"title": "Initial Imaging", "tag": "investigation", "stem": "What is the most important initial imaging test before thrombolysis decision?", "options": [["A", "Non-contrast CT brain"], ["B", "Skull X-ray"], ["C", "EEG"], ["D", "Carotid Doppler only"]], "answer": "A. Non-contrast CT brain", "discriminator": "Need to exclude intracranial hemorrhage urgently.", "trap": "MRI may be sensitive, but CT is the usual immediate rule-out test in the acute pathway.", "future_alert": "Before thrombolysis, exclude bleed with urgent non-contrast CT."}, {"title": "Thrombolysis Eligible", "tag": "management", "stem": "He is within the treatment window, CT shows no bleed, and no contraindications are present. What treatment should be considered?", "options": [["A", "IV thrombolysis"], ["B", "High-dose steroids"], ["C", "Immediate warfarin"], ["D", "Lumbar puncture"]], "answer": "A. IV thrombolysis", "discriminator": "Disabling ischemic stroke within window after hemorrhage exclusion.", "trap": "Anticoagulation is not the acute reperfusion choice for standard eligible ischemic stroke.", "future_alert": "Eligible early ischemic stroke after CT bleed exclusion can receive thrombolysis."}, {"title": "Mimic Shift", "tag": "mimic", "stem": "Now the same symptoms occur with sweating, confusion, and capillary glucose of 38 mg/dL. What is the next best step?", "options": [["A", "Give dextrose"], ["B", "Give thrombolysis immediately"], ["C", "Start antiepileptic therapy"], ["D", "Arrange elective MRI"]], "answer": "A. Give dextrose", "discriminator": "Hypoglycemia can mimic stroke and must be corrected.", "trap": "The focal signs are distracting, but low glucose is immediately reversible.", "future_alert": "Always check glucose in suspected stroke."}], "final_learning_rule": "Stroke ladders change onset time, CT bleed status, glucose, contraindications, and focal cortical signs to test thrombolysis logic."}, {"title": "Shortness of Breath: Asthma vs COPD vs PE", "accent": "emerald", "base_case": "A 22-year-old woman with known asthma presents with acute wheeze, chest tightness, and shortness of breath after dust exposure. She is speaking in short phrases and has widespread expiratory wheeze.", "decision_flow": [{"label": "Young + atopy", "text": "Asthma likely"}, {"label": "Silent chest", "text": "Life-threatening asthma"}, {"label": "Smoker + chronic cough", "text": "COPD shift"}, {"label": "Pleuritic + risk", "text": "PE shift"}], "segments": [{"title": "Diagnosis Recognition", "tag": "diagnosis", "stem": "What is the most likely diagnosis?", "options": [["A", "Acute asthma exacerbation"], ["B", "Pulmonary embolism"], ["C", "COPD exacerbation"], ["D", "Pneumonia"]], "answer": "A. Acute asthma exacerbation", "discriminator": "Young patient, known asthma, trigger exposure, wheeze, and chest tightness.", "trap": "PE can cause dyspnea, but wheeze after allergen/dust exposure points toward asthma.", "future_alert": "Trigger plus reversible wheeze in a young asthmatic is acute asthma."}, {"title": "First-Line Treatment", "tag": "management", "stem": "What is the best immediate treatment?", "options": [["A", "Nebulized salbutamol plus oxygen as needed"], ["B", "Oral beta blocker"], ["C", "Long-term inhaled steroid only"], ["D", "Fluid restriction only"]], "answer": "A. Nebulized salbutamol plus oxygen as needed", "discriminator": "Acute bronchospasm requires rapid bronchodilation and oxygen assessment.", "trap": "Inhaled steroids prevent exacerbations but are not the sole immediate rescue treatment.", "future_alert": "Acute asthma rescue starts with inhaled short-acting beta agonist."}, {"title": "Life-Threatening Variant", "tag": "danger shift", "stem": "Now she becomes exhausted with a silent chest, cyanosis, and falling oxygen saturation. What does this indicate?", "options": [["A", "Improving asthma"], ["B", "Life-threatening asthma"], ["C", "Simple anxiety"], ["D", "Mild bronchitis"]], "answer": "B. Life-threatening asthma", "discriminator": "Silent chest in severe asthma means minimal air movement, not improvement.", "trap": "Less wheeze may look better, but in exhaustion it is ominous.", "future_alert": "Silent chest in asthma is a red flag."}, {"title": "PE Shift", "tag": "mimic", "stem": "Change the case: she has sudden dyspnea, pleuritic chest pain, hemoptysis, tachycardia, and recent immobilization after a fracture. What is most concerning?", "options": [["A", "Pulmonary embolism"], ["B", "Acute asthma only"], ["C", "GERD"], ["D", "Panic attack only"]], "answer": "A. Pulmonary embolism", "discriminator": "Pleuritic pain, hemoptysis, tachycardia, and immobilization risk.", "trap": "Dyspnea can anchor on asthma, but VTE risk plus pleuritic symptoms shifts to PE.", "future_alert": "Sudden dyspnea with pleuritic pain and immobilization is PE until excluded."}], "final_learning_rule": "Dyspnea questions change trigger, wheeze quality, smoking history, silent chest, pleuritic pain, and VTE risk to separate asthma, COPD, and PE."}, {"title": "DKA vs HHS", "accent": "coral", "base_case": "A 19-year-old man with type 1 diabetes presents with vomiting, abdominal pain, dehydration, deep rapid breathing, and fruity breath. Random glucose is high and urine ketones are positive.", "decision_flow": [{"label": "T1DM + ketones", "text": "DKA"}, {"label": "Kussmaul breathing", "text": "Metabolic acidosis"}, {"label": "Older T2DM + very high glucose", "text": "HHS"}, {"label": "Treatment order", "text": "Fluids then insulin with potassium check"}], "segments": [{"title": "Diagnosis Recognition", "tag": "diagnosis", "stem": "What is the most likely diagnosis?", "options": [["A", "Diabetic ketoacidosis"], ["B", "Hyperosmolar hyperglycemic state"], ["C", "Hypoglycemia"], ["D", "SIADH"]], "answer": "A. Diabetic ketoacidosis", "discriminator": "Type 1 diabetes, vomiting, abdominal pain, Kussmaul breathing, fruity breath, and ketones.", "trap": "HHS also has hyperglycemia but usually lacks prominent ketoacidosis.", "future_alert": "Ketones plus acidosis symptoms in type 1 diabetes equals DKA."}, {"title": "Immediate Priority", "tag": "management", "stem": "What is the first major treatment priority?", "options": [["A", "IV fluids"], ["B", "Oral hypoglycemic tablet"], ["C", "Fluid restriction"], ["D", "Immediate bicarbonate for all cases"]], "answer": "A. IV fluids", "discriminator": "Severe dehydration is central and resuscitation begins with fluids.", "trap": "Insulin is essential, but fluids and potassium assessment are early priorities.", "future_alert": "DKA management begins with fluids, then insulin with potassium safety."}, {"title": "Potassium Safety", "tag": "safety", "stem": "Before starting insulin infusion, which electrolyte must be assessed carefully?", "options": [["A", "Potassium"], ["B", "Calcium only"], ["C", "Magnesium only"], ["D", "Phosphate only"]], "answer": "A. Potassium", "discriminator": "Insulin drives potassium into cells and can worsen hypokalemia.", "trap": "The measured potassium may be misleadingly normal or high despite total body deficit.", "future_alert": "Never forget potassium safety before insulin in DKA."}, {"title": "HHS Shift", "tag": "variant", "stem": "Now the patient is a 72-year-old with type 2 diabetes, profound dehydration, confusion, extremely high glucose, minimal ketones, and no marked acidosis. What is most likely?", "options": [["A", "DKA"], ["B", "HHS"], ["C", "Addisonian crisis"], ["D", "Lactic acidosis only"]], "answer": "B. HHS", "discriminator": "Older type 2 diabetic with severe hyperosmolar dehydration, very high glucose, and minimal ketosis.", "trap": "High glucose appears in both, so ketones/acidosis and age/type pattern decide.", "future_alert": "Very high glucose with dehydration and minimal ketones in older T2DM points to HHS."}], "final_learning_rule": "DKA/HHS ladders change diabetes type, ketones, acidosis, breathing pattern, mental status, and treatment sequencing."}, {"title": "Meningitis vs Encephalitis", "accent": "emerald", "base_case": "A 20-year-old student presents with fever, severe headache, neck stiffness, photophobia, and vomiting. He is drowsy but has no focal neurologic deficit.", "decision_flow": [{"label": "Fever + neck stiffness", "text": "Meningitis"}, {"label": "Do not delay antibiotics", "text": "Treat urgently"}, {"label": "Seizure/focal signs", "text": "CT before LP"}, {"label": "Personality/seizures", "text": "Encephalitis shift"}], "segments": [{"title": "Diagnosis Recognition", "tag": "diagnosis", "stem": "What is the most likely diagnosis?", "options": [["A", "Acute bacterial meningitis"], ["B", "Migraine"], ["C", "Tension headache"], ["D", "Subarachnoid hemorrhage only"]], "answer": "A. Acute bacterial meningitis", "discriminator": "Fever, headache, neck stiffness, photophobia, vomiting, and drowsiness.", "trap": "Migraine can cause photophobia and vomiting, but fever and neck stiffness are decisive.", "future_alert": "Fever plus neck stiffness is meningitis until proven otherwise."}, {"title": "Immediate Management", "tag": "management", "stem": "What is the key immediate management principle?", "options": [["A", "Start empiric antibiotics urgently"], ["B", "Wait 48 hours for culture before treatment"], ["C", "Give analgesics only"], ["D", "Discharge if rash absent"]], "answer": "A. Start empiric antibiotics urgently", "discriminator": "Bacterial meningitis is time-critical.", "trap": "Confirmatory tests matter, but treatment should not be dangerously delayed.", "future_alert": "Suspected bacterial meningitis needs urgent empiric antibiotics."}, {"title": "LP Safety Shift", "tag": "safety", "stem": "Now he has papilledema and a new focal neurologic deficit. What should happen before lumbar puncture?", "options": [["A", "CT brain first"], ["B", "Immediate LP without imaging"], ["C", "No antibiotics until LP"], ["D", "Outpatient neurology review"]], "answer": "A. CT brain first", "discriminator": "Signs of raised intracranial pressure or focal deficit increase herniation risk.", "trap": "LP confirms meningitis, but safety signs change sequencing.", "future_alert": "Papilledema or focal deficit means image before LP."}, {"title": "Encephalitis Shift", "tag": "mimic", "stem": "Change the case: fever is associated with confusion, seizures, personality change, and focal temporal-lobe features. What is more likely?", "options": [["A", "Encephalitis"], ["B", "Uncomplicated migraine"], ["C", "Tension headache"], ["D", "Sinusitis only"]], "answer": "A. Encephalitis", "discriminator": "Altered behavior, seizures, and focal brain involvement.", "trap": "Meningitis and encephalitis overlap, but seizures/personality change favor encephalitis.", "future_alert": "Fever plus seizures or personality change means think encephalitis."}], "final_learning_rule": "CNS infection questions change neck stiffness, rash, consciousness, focal signs, papilledema, seizures, and LP safety sequencing."}, {"title": "Shock Patterns", "accent": "coral", "base_case": "A 24-year-old man arrives after a road traffic accident with hypotension, tachycardia, cool clammy skin, weak pulse, and abdominal distension.", "decision_flow": [{"label": "Trauma + cold clammy", "text": "Hypovolemic shock"}, {"label": "Fever + warm early", "text": "Septic shock"}, {"label": "Chest pain + JVP", "text": "Cardiogenic/obstructive clue"}, {"label": "Treatment", "text": "Control cause + resuscitate"}], "segments": [{"title": "Shock Type", "tag": "diagnosis", "stem": "What type of shock is most likely?", "options": [["A", "Hypovolemic shock"], ["B", "Neurogenic shock"], ["C", "Anaphylactic shock"], ["D", "Septic shock"]], "answer": "A. Hypovolemic shock", "discriminator": "Trauma with hypotension, tachycardia, cold clammy skin, and suspected intra-abdominal bleeding.", "trap": "All shock causes hypotension, but trauma and cold peripheral shutdown indicate volume loss.", "future_alert": "Trauma plus cold clammy hypotension is hemorrhagic shock until proven otherwise."}, {"title": "Initial Priority", "tag": "management", "stem": "What is the immediate management priority?", "options": [["A", "Airway/breathing support and rapid hemorrhage control with fluid/blood resuscitation"], ["B", "Oral fluids only"], ["C", "Diuretics"], ["D", "Delay all treatment until CT"]], "answer": "A. Airway/breathing support and rapid hemorrhage control with fluid/blood resuscitation", "discriminator": "Shock management is simultaneous resuscitation and control of bleeding.", "trap": "CT can define injury, but unstable hemorrhagic shock cannot wait.", "future_alert": "In unstable trauma shock, resuscitate and control bleeding before leisurely imaging."}, {"title": "Septic Shift", "tag": "variant", "stem": "Now the patient is elderly with pneumonia, fever, confusion, hypotension, warm peripheries early, and raised lactate. What type of shock is most likely?", "options": [["A", "Septic shock"], ["B", "Hypovolemic shock"], ["C", "Neurogenic shock"], ["D", "Obstructive shock"]], "answer": "A. Septic shock", "discriminator": "Infection source, fever, hypotension, altered mental state, and lactate elevation.", "trap": "Hypotension alone does not define hemorrhage. The infection source changes the frame.", "future_alert": "Infection plus hypotension and lactate is septic shock."}, {"title": "Anaphylaxis Shift", "tag": "variant", "stem": "Now hypotension occurs minutes after an injection with wheeze, urticaria, facial swelling, and stridor. What is the first-line drug?", "options": [["A", "Intramuscular adrenaline"], ["B", "Oral antihistamine only"], ["C", "Furosemide"], ["D", "Aspirin"]], "answer": "A. Intramuscular adrenaline", "discriminator": "Rapid airway/skin/circulatory features after allergen exposure.", "trap": "Antihistamines help symptoms but are not first-line for life-threatening anaphylaxis.", "future_alert": "Anaphylaxis with airway or hypotension needs IM adrenaline first."}], "final_learning_rule": "Shock ladders change trigger, skin temperature, infection source, JVP, airway signs, and response priority to classify shock type and first action."}, {"title": "Acute Abdomen: Appendicitis vs Perforation", "accent": "emerald", "base_case": "A 19-year-old man presents with periumbilical pain that migrated to the right iliac fossa, anorexia, nausea, low-grade fever, and localized tenderness at McBurney point.", "decision_flow": [{"label": "Migratory RIF pain", "text": "Appendicitis"}, {"label": "Generalized rigidity", "text": "Peritonitis/perforation"}, {"label": "Epigastric to back", "text": "Pancreatitis shift"}, {"label": "RUQ after fatty meal", "text": "Biliary shift"}], "segments": [{"title": "Diagnosis Recognition", "tag": "diagnosis", "stem": "What is the most likely diagnosis?", "options": [["A", "Acute appendicitis"], ["B", "Renal colic"], ["C", "Gastroenteritis"], ["D", "Acute cholecystitis"]], "answer": "A. Acute appendicitis", "discriminator": "Migratory periumbilical to right iliac fossa pain with anorexia and localized tenderness.", "trap": "Gastroenteritis causes abdominal pain, but migration and localized RIF tenderness are classic appendicitis.", "future_alert": "Migratory RIF pain plus anorexia is appendicitis until proven otherwise."}, {"title": "Management Direction", "tag": "management", "stem": "What is the usual definitive management for classic acute appendicitis?", "options": [["A", "Appendectomy after appropriate assessment/resuscitation"], ["B", "Long-term antacid therapy"], ["C", "Immediate colonoscopy"], ["D", "Reassurance only"]], "answer": "A. Appendectomy after appropriate assessment/resuscitation", "discriminator": "Classic appendicitis is a surgical disease.", "trap": "Analgesia and antibiotics may be used, but they do not erase definitive surgical logic in classic cases.", "future_alert": "Classic appendicitis usually moves toward appendectomy."}, {"title": "Perforation Shift", "tag": "danger shift", "stem": "Now he has severe generalized abdominal pain, board-like rigidity, rebound tenderness, and sepsis. What complication is most concerning?", "options": [["A", "Perforation with peritonitis"], ["B", "Simple constipation"], ["C", "Irritable bowel syndrome"], ["D", "Uncomplicated gastritis"]], "answer": "A. Perforation with peritonitis", "discriminator": "Generalized peritoneal signs and systemic toxicity.", "trap": "Pain severity alone is vague; rigidity and rebound make it surgical peritonitis.", "future_alert": "Board-like rigidity means peritonitis until proven otherwise."}, {"title": "Pancreatitis Shift", "tag": "mimic", "stem": "Change the case: pain is severe epigastric, radiates to the back, improves leaning forward, and serum lipase is elevated. What is most likely?", "options": [["A", "Acute pancreatitis"], ["B", "Acute appendicitis"], ["C", "Mesenteric adenitis"], ["D", "Cystitis"]], "answer": "A. Acute pancreatitis", "discriminator": "Epigastric pain radiating to back with raised lipase.", "trap": "Vomiting overlaps with appendicitis, but pain location and lipase shift the answer.", "future_alert": "Epigastric pain to back plus high lipase is pancreatitis."}], "final_learning_rule": "Acute abdomen ladders change pain migration, location, peritoneal signs, fever, labs, and radiation to separate appendicitis from surgical mimics."}, {"title": "Hypertensive Pregnancy: Preeclampsia/Eclampsia", "accent": "coral", "base_case": "A 30-year-old primigravida at 34 weeks presents with headache, visual blurring, facial swelling, blood pressure 165/110 mmHg, and proteinuria.", "decision_flow": [{"label": "HTN after 20 weeks + protein", "text": "Preeclampsia"}, {"label": "Seizure", "text": "Eclampsia"}, {"label": "Severe features", "text": "Magnesium + delivery planning"}, {"label": "No protein early pregnancy", "text": "Chronic HTN shift"}], "segments": [{"title": "Diagnosis Recognit const dashboard = document.getElementById('dashboard');
const profileSelect = document.getElementById('profileSelect');
const modeSelect = document.getElementById('modeSelect');
const themeSelect = document.getElementById('themeSelect');
const profileName = document.getElementById('profileName');
const toast = document.getElementById('toast');
const profileStoreKey = 'caseLadderProfilesV1';
const prefsKey = 'caseLadderPrefsV1';
const legacyCompleted = JSON.parse(localStorage.getItem('caseLadderCompleted') || '[]');
let profiles = loadProfiles();
let prefs = loadPrefs();
let activeProfileId = prefs.activeProfileId && profiles[prefs.activeProfileId] ? prefs.activeProfileId : Object.keys(profiles)[0];
let completed = new Set(profiles[activeProfileId].completed || []);

document.getElementById('topicCount').textContent = data.topics.length;
document.getElementById('segmentCount').textContent = data.topics.reduce((n,t)=>n+t.segments.length,0);

function themeFor(topic) { return palette[topic.accent] || palette.emerald; }
function segmentId(ti, si) { return `${ti}-${si}`; }
function loadProfiles() {
  const stored = JSON.parse(localStorage.getItem(profileStoreKey) || 'null');
  if (stored && Object.keys(stored).length) return stored;
  return { default: { id: 'default', name: 'Default', completed: legacyCompleted } };
}
function loadPrefs() { return JSON.parse(localStorage.getItem(prefsKey) || '{"mode":"light","theme":"default","activeProfileId":"default"}'); }
function saveProfiles() { localStorage.setItem(profileStoreKey, JSON.stringify(profiles)); }
function savePrefs() { localStorage.setItem(prefsKey, JSON.stringify(prefs)); }
function saveProgress() {
  profiles[activeProfileId].completed = [...completed];
  saveProfiles();
  updateProgress();
  renderSidebar();
}
function applyPrefs() {
  document.body.dataset.mode = prefs.mode || 'light';
  document.body.dataset.theme = prefs.theme || 'default';
  modeSelect.value = prefs.mode || 'light';
  themeSelect.value = prefs.theme || 'default';
}
function switchProfile(id) {
  activeProfileId = id;
  prefs.activeProfileId = id;
  completed = new Set(profiles[id].completed || []);
  savePrefs();
  renderProfiles();
  render();
  showToast(`Profile: ${profiles[id].name}`);
}
function renderProfiles() {
  profileSelect.innerHTML = '';
  Object.values(profiles).forEach(profile => {
    const opt = document.createElement('option');
    opt.value = profile.id;
    opt.textContent = profile.name;
    if (profile.id === activeProfileId) opt.selected = true;
    profileSelect.appendChild(opt);
  });
}
function showToast(message) {
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => toast.classList.remove('show'), 1400);
}
function updateProgress() {
  const total = data.topics.reduce((n,t)=>n+t.segments.length,0);
  const count = completed.size;
  document.getElementById('progressText').textContent = `${count} of ${total} segments completed`;
  document.getElementById('progressBar').style.width = total ? `${Math.round(count/total*100)}%` : '0%';
  renderDashboard(total, count);
}
function allTags() { return [...new Set(data.topics.flatMap(t => t.segments.map(s => s.tag || 'untagged')))].sort(); }
function topicDoneCount(idx) { return data.topics[idx].segments.filter((_, si) => completed.has(segmentId(idx, si))).length; }
function renderDashboard(total, count) {
  const completeTopics = data.topics.filter((_, idx) => topicDoneCount(idx) === data.topics[idx].segments.length).length;
  const openTopics = data.topics.filter((_, idx) => topicDoneCount(idx) > 0 && topicDoneCount(idx) < data.topics[idx].segments.length).length;
  const percent = total ? Math.round(count / total * 100) : 0;
  dashboard.innerHTML = `
    <div class="dash-card"><b>${percent}%</b><span>Complete</span></div>
    <div class="dash-card"><b>${completeTopics}</b><span>Topics done</span></div>
    <div class="dash-card"><b>${openTopics}</b><span>In progress</span></div>
    <div class="dash-card"><b>${data.topics.length - completeTopics}</b><span>Remaining</span></div>
  `;
}
function matchesTopic(topic) {
  const q = searchBox.value.trim().toLowerCase();
  const tag = tagFilter.value;
  const hay = JSON.stringify(topic).toLowerCase();
  const tagOk = !tag || topic.segments.some(s => (s.tag || 'untagged') === tag);
  return tagOk && (!q || hay.includes(q));
}
function renderSidebar() {
  topicList.innerHTML = '';
  let shown = 0;
  data.topics.forEach((topic, idx) => {
    if (!matchesTopic(topic)) return;
    shown++;
    const th = themeFor(topic);
    const btn = document.createElement('button');
    btn.className = 'topic-button' + (idx === activeIndex ? ' active' : '');
    const doneCount = topicDoneCount(idx);
    if (doneCount === topic.segments.length) btn.className += ' done';
    btn.style.setProperty('--topic-primary', th.primary);
    btn.style.setProperty('--topic-soft', th.soft);
    btn.style.setProperty('--topic-ink', th.ink);
    btn.style.setProperty('--done-width', `${Math.round(doneCount / topic.segments.length * 100)}%`);
    btn.innerHTML = `<span class="topic-title">${idx+1}. ${escapeHtml(topic.title)}</span><span class="topic-meta">${doneCount}/${topic.segments.length} segments</span><span class="topic-progress"><i></i></span>`;
    btn.onclick = () => { activeIndex = idx; render(); window.scrollTo({top:0, behavior:'smooth'}); };
    topicList.appendChild(btn);
  });
  empty.style.display = shown ? 'none' : 'block';
}
function renderTopic(topic, idx) {
  const th = themeFor(topic);
  content.style.setProperty('--topic-primary', th.primary);
  content.style.setProperty('--topic-soft', th.soft);
  content.style.setProperty('--topic-ink', th.ink);
  const flow = topic.decision_flow.map(step => `<div class="flow-card"><strong>${escapeHtml(step.label)}</strong><span>${escapeHtml(step.text)}</span></div>`).join('');
  const segments = topic.segments.map((s, si) => renderSegment(s, idx, si)).join('');
  return `<section class="hero"><h2>Topic ${idx+1}: ${escapeHtml(topic.title)}</h2><div class="base-case"><div class="label">Base Case</div><p>${escapeHtml(topic.base_case)}</p></div><div class="flow">${flow}</div></section><section class="segment-grid">${segments}</section><div class="final-rule"><strong>Final Learning Rule</strong>${escapeHtml(topic.final_learning_rule)}</div>`;
}
function renderSegment(s, ti, si) {
  const id = segmentId(ti, si);
  const opts = s.options.map(o => `<div class="option"><span class="letter">${escapeHtml(o[0])}</span><span>${escapeHtml(o[1])}</span></div>`).join('');
  const done = completed.has(id) ? 'Done' : 'Mark done';
  return `<article class="segment" data-segment="${id}"><div class="segment-head"><h3>Segment ${si+1}: ${escapeHtml(s.title)}</h3><span class="tag">${escapeHtml(s.tag || 'untagged')}</span></div><div class="segment-body"><p class="stem">${escapeHtml(s.stem)}</p><div class="options">${opts}</div><div class="reveal-row"><button class="reveal-btn" data-action="answer">Show answer</button><button class="reveal-btn alt" data-action="all">Show all reasoning</button><button class="reveal-btn alt" data-action="done">${done}</button></div><div class="explain"><div class="explain-card answer"><b>Answer</b><p>${escapeHtml(s.answer)}</p></div><div class="explain-card"><b>Discriminator</b><p>${escapeHtml(s.discriminator)}</p></div><div class="explain-card trap"><b>Trap</b><p>${escapeHtml(s.trap)}</p></div><div class="explain-card alert"><b>Future Alert</b><p>${escapeHtml(s.future_alert)}</p></div></div></div></article>`;
}
function wireContent() {
  document.querySelectorAll('.segment-head').forEach(head => head.onclick = () => head.parentElement.classList.toggle('open'));
  document.querySelectorAll('[data-action]').forEach(btn => btn.onclick = e => {
    const segment = e.target.closest('.segment');
    const explain = segment.querySelector('.explain');
    const action = e.target.dataset.action;
    if (action === 'answer' || action === 'all') explain.classList.toggle('show');
    if (action === 'done') {
      const id = segment.dataset.segment;
      if (completed.has(id)) completed.delete(id); else completed.add(id);
      e.target.textContent = completed.has(id) ? 'Done' : 'Mark done';
      saveProgress();
      showToast(completed.has(id) ? 'Segment saved' : 'Segment unchecked');
    }
  });
}
function render() {
  if (!matchesTopic(data.topics[activeIndex])) {
    const next = data.topics.findIndex(matchesTopic);
    if (next >= 0) activeIndex = next;
  }
  renderSidebar();
  if (matchesTopic(data.topics[activeIndex])) { content.innerHTML = renderTopic(data.topics[activeIndex], activeIndex); wireContent(); }
  else { content.innerHTML = ''; }
  updateProgress();
}
function escapeHtml(str) { return String(str).replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }

allTags().forEach(tag => { const opt=document.createElement('option'); opt.value=tag; opt.textContent=tag; tagFilter.appendChild(opt); });
searchBox.addEventListener('input', render);
tagFilter.addEventListener('change', render);
profileSelect.addEventListener('change', e => switchProfile(e.target.value));
modeSelect.addEventListener('change', e => {
  prefs.mode = e.target.value;
  applyPrefs();
  savePrefs();
  showToast(`${prefs.mode === 'dark' ? 'Dark' : 'Light'} mode`);
});
themeSelect.addEventListener('change', e => {
  prefs.theme = e.target.value;
  applyPrefs();
  savePrefs();
  showToast(`Theme: ${e.target.options[e.target.selectedIndex].textContent}`);
});
document.getElementById('addProfile').onclick = () => {
  const name = profileName.value.trim();
  if (!name) { showToast('Enter a profile name'); return; }
  const id = 'p' + Date.now().toString(36);
  profiles[id] = { id, name, completed: [] };
  saveProfiles();
  profileName.value = '';
  switchProfile(id);
};
document.getElementById('deleteProfile').onclick = () => {
  if (activeProfileId === 'default') { showToast('Default profile stays'); return; }
  const name = profiles[activeProfileId].name;
  if (!confirm(`Delete profile ${name}?`)) return;
  delete profiles[activeProfileId];
  saveProfiles();
  switchProfile('default');
  showToast('Profile deleted');
};
document.getElementById('resetProgress').onclick = () => {
  if (!confirm(`Reset progress for ${profiles[activeProfileId].name}?`)) return;
  completed = new Set();
  saveProgress();
  render();
  showToast('Progress reset');
};
document.getElementById('expandAll').onclick = () => document.querySelectorAll('.segment').forEach(s => s.classList.add('open'));
document.getElementById('collapseAll').onclick = () => document.querySelectorAll('.segment').forEach(s => s.classList.remove('open'));
applyPrefs();
renderProfiles();
render();
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  navigator.serviceWorker.register('service worker.js').catch(() => {});
}
</script>
</body>
</html>
